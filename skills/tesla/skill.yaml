    description: "Control the Tesla seat heater"
    shortcut_arguments:
      action: vehicle.climate.seat_heater
      vehicle: default
    parameters:
      - name: seat
        type: string
        description: "Which seat (frontLeft, frontRight, rearLeft, rearCenter, rearRight)"
        required: true
      - name: level
        type: string
        description: "Heater level (off, low, medium, high)"
        required: true
    examples:
      - heat my seat
      - turn on the seat heater
      - warm up the driver seat
      - set passenger seat heater to high
      - turn off the seat heater

  - id: vehicle.defrost.start
    title: "Start Defrost"
    description: "Turn on the Tesla windshield defrost"
    shortcut_arguments:
