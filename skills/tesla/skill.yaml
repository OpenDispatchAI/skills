skill_id: tesla
name: Tesla
version: 1.0.0
author: OpenDispatch
tags:
  - automotive
description: "Full implementation of the official Tesla app for controlling your car via OpenDispatch."
bridge_shortcut: "OpenDispatch - Tesla V1"
bridge_shortcut_source: "OpenDispatch - Tesla V1.cherri"

actions:
  - id: vehicle.unlock
    title: "Unlock"
    description: "Unlock your Tesla vehicle"
    shortcut_arguments:
      action: vehicle.unlock
      vehicle: default
    examples:
      - unlock my car
      - unlock the tesla
      - unlock my tesla
      - open the car
      - open my tesla
    negative_examples:
      - open the windows
      - open the car windows

  - id: vehicle.lock
    title: "Lock"
    description: "Lock your Tesla vehicle"
    shortcut_arguments:
      action: vehicle.lock
      vehicle: default
    examples:
      - lock my car
      - lock the tesla
      - lock my tesla
      - secure the car
    negative_examples:
        - close the windows
        - close the car windows

  - id: vehicle.climate.start
    title: "Start Climate"
    description: "Turn on the Tesla climate control to pre-condition the cabin"
    shortcut_arguments:
      action: vehicle.climate.start
      vehicle: default
    examples:
      - turn on the car ac
      - start tesla climate
      - precondition the car
      - warm up the car
      - cool down the tesla
      - turn on the airco
      - heat the car

  - id: vehicle.climate.stop
    title: "Stop Climate"
    description: "Turn off the Tesla climate control"
    shortcut_arguments:
      action: vehicle.climate.stop
      vehicle: default
    examples:
      - turn off the car ac
      - stop tesla climate
      - stop heating the car
      - turn off the airco

  - id: vehicle.climate.set_temperature
    title: "Set Temperature"
    description: "Set the Tesla cabin temperature"
    shortcut_arguments:
      action: vehicle.climate.set_temperature
      vehicle: default
      temperature: "{{temperature}}"
    parameters:
      - name: temperature
        type: number
        description: "Target temperature in degrees"
        required: true
    examples:
      - set the car to 21 degrees
      - make the tesla 19 degrees
      - set cabin temperature to 22
      - car temperature 20

  - id: vehicle.horn
    title: "Honk Horn"
    description: "Sound the Tesla horn"
    shortcut_arguments:
      action: vehicle.horn
      vehicle: default
    examples:
      - honk the horn
      - honk my tesla
      - beep the car
      - sound the horn
      - find my car

  - id: vehicle.flash_lights
    title: "Flash Lights"
    description: "Flash the Tesla headlights"
    shortcut_arguments:
      action: vehicle.flash_lights
      vehicle: default
    examples:
      - flash the lights
      - flash my tesla
      - blink the car lights
      - flash headlights

  - id: vehicle.trunk.open
    title: "Open Trunk"
    description: "Open the Tesla rear trunk"
    shortcut_arguments:
      action: vehicle.trunk.open
      vehicle: default
    examples:
      - open the trunk
      - pop the trunk
      - open tesla trunk
      - open the boot

  - id: vehicle.frunk.open
    title: "Open Frunk"
    description: "Open the Tesla front trunk (frunk)"
    shortcut_arguments:
      action: vehicle.frunk.open
      vehicle: default
    examples:
      - open the frunk
      - open front trunk
      - pop the frunk
      - open tesla frunk

  - id: vehicle.charge.start
    title: "Start Charging"
    description: "Start charging the Tesla"
    shortcut_arguments:
      action: vehicle.charge.start
      vehicle: default
    examples:
      - start charging
      - charge the tesla
      - start charging the car
      - plug in and charge

  - id: vehicle.charge.stop
    title: "Stop Charging"
    description: "Stop charging the Tesla"
    shortcut_arguments:
      action: vehicle.charge.stop
      vehicle: default
    examples:
      - stop charging
      - stop charging the tesla
      - stop charging the car

  - id: vehicle.charge.set_limit
    title: "Set Charge Limit"
    description: "Set the Tesla charge limit percentage"
    shortcut_arguments:
      action: vehicle.charge.set_limit
      vehicle: default
      limit: "{{limit}}"
    parameters:
      - name: limit
        type: number
        description: "Charge limit percentage (50-100)"
        required: true
    examples:
      - set charge limit to 80
      - charge to 90 percent
      - limit charging to 80

  - id: vehicle.sentry.enable
    title: "Enable Sentry Mode"
    description: "Turn on Tesla Sentry Mode"
    shortcut_arguments:
      action: vehicle.sentry.enable
