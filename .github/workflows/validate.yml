name: Validate Skills

on:
  pull_request:
    branches: [main]
    paths:
      - "skills/**"
      - "tags.yaml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate skills
        run: python scripts/validate.py
